title: Mini Shai-Hulud Supply-Chain Malware - Suspicious Git Commit Author Spoofing
id: bd6h5f4g-8gae-7hcd-e9fb-4i5d6g7h8i9d
status: experimental
description: |
    Detects git commits authored by claude@users.noreply.github.com that may indicate
    repository poisoning by the Mini Shai-Hulud worm.
references:
    - https://socket.dev/blog/tanstack-npm-packages-compromised-mini-shai-hulud-supply-chain-attack
    - https://safedep.io/mass-npm-supply-chain-attack-tanstack-mistral/
author: SecEng
date: 2026/05/12
tags:
    - attack.persistence
    - attack.t1195.002
    - attack.defense-evasion
    - attack.t1036
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        CommandLine|contains|all:
            - 'git'
            - 'commit'
            - 'claude@users.noreply.github.com'
    condition: selection
falsepositives:
    - Legitimate Claude Code GitHub App commits (verify via GitHub App signature)
level: high
