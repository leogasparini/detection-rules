title: Mini Shai-Hulud Supply-Chain Malware - Suspicious Process Execution
id: e22134b4-c9ed-4e23-b0de-b04d336274e7
status: experimental
description: |
    Detects process execution patterns associated with the Mini Shai-Hulud malware, including lifecycle hook
    execution, daemonized Node.js processes, and PyPI payload execution.
references:
    - https://socket.dev/blog/tanstack-npm-packages-compromised-mini-shai-hulud-supply-chain-attack
    - https://safedep.io/mass-npm-supply-chain-attack-tanstack-mistral/
author: SecEng
date: 2026-05-12
tags:
    - attack.execution
    - attack.t1059.007
    - attack.t1059.006
    - attack.t1204.002
logsource:
    category: process_creation
    product: windows
detection:
    selection_bun_runner:
        CommandLine|contains|all:
            - 'bun'
            - 'run'
            - 'tanstack_runner.js'
    selection_node_router_init:
        Image|endswith:
            - '\node.exe'
            - '\bun.exe'
        CommandLine|contains:
            - 'router_init.js'
            - 'router_runtime.js'
    selection_node_daemonized:
        Image|endswith: '\node.exe'
        CommandLine|contains: '__DAEMONIZED'
    selection_pypi_payload:
        CommandLine|contains|all:
            - 'python'
            - '/tmp/transformers.pyz'
    condition: 1 of selection_*
falsepositives:
    - Unlikely
level: high
