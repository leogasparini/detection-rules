title: Mini Shai-Hulud - IMDS Credential Harvesting from Node.js
id: ce7i6g5h-9hbf-8ide-fagc-5j6e7h8i9j0e
status: experimental
description: Detects Node.js or Bun processes making HTTP requests to AWS IMDS or ECS metadata endpoints, indicative of credential harvesting.
references:
    - https://socket.dev/blog/tanstack-npm-packages-compromised-mini-shai-hulud-supply-chain-attack
    - https://safedep.io/mass-npm-supply-chain-attack-tanstack-mistral/
author: SecEng
date: 2026-05-12
tags:
    - attack.credential-access
    - attack.t1552.005
    - attack.discovery
    - attack.t1580
logsource:
    category: network_connection
    product: linux
detection:
    selection_process:
        Image|endswith:
            - '/node'
            - '/bun'
    selection_imds:
        DestinationIp:
            - '169.254.169.254'
            - '169.254.170.2'
    condition: selection_process and selection_imds
falsepositives:
    - Legitimate AWS SDK calls from Node.js applications running on EC2/ECS
level: medium
