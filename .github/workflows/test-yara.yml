name: Test YARA Rules

on:
  push:
    paths:
      - 'rules/yara/**'
      - 'tests/**'
  pull_request:
    paths:
      - 'rules/yara/**'
      - 'tests/**'

jobs:
  yara-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install YARA
        run: sudo apt-get update && sudo apt-get install -y yara

      - name: Compile all rules
        run: |
          fail=0
          for rule in rules/yara/*.yar; do
            echo "Compiling: $rule"
            if ! yara "$rule" /dev/null 2>&1; then
              echo "FAIL: $rule has syntax errors"
              fail=1
            fi
          done
          if [ "$fail" -eq 1 ]; then exit 1; fi

      - name: True positives (must match expected rules)
        run: |
          fail=0
          total=0
          passed=0

          for rule in rules/yara/*.yar; do
            output=$(yara "$rule" tests/true_positives/ -r 2>/dev/null)

            for f in tests/true_positives/*; do
              [ -f "$f" ] || continue
              basename=$(basename "$f")
              # Check if an .expected file exists with expected rule names
              expected_file="tests/expected/${basename}.expected"
              if [ -f "$expected_file" ]; then
                while IFS= read -r expected_rule; do
                  [ -z "$expected_rule" ] && continue
                  total=$((total + 1))
                  if echo "$output" | grep -q "^${expected_rule} .*${basename}"; then
                    passed=$((passed + 1))
                  else
                    echo "FAIL: $basename did not trigger expected rule: $expected_rule"
                    fail=1
                  fi
                done < "$expected_file"
              else
                # Fallback: just verify the file triggers at least one rule
                total=$((total + 1))
                if echo "$output" | grep -q "$basename"; then
                  passed=$((passed + 1))
                else
                  echo "FAIL: $basename did not trigger any rule in $(basename $rule)"
                  fail=1
                fi
              fi
            done
          done

          echo ""
          echo "=== Results: $passed/$total assertions passed ==="
          if [ "$fail" -eq 1 ]; then exit 1; fi

      - name: True negatives (must NOT match)
        run: |
          fail=0
          for rule in rules/yara/*.yar; do
            output=$(yara "$rule" tests/true_negatives/ -r 2>/dev/null || true)
            if [ -n "$output" ]; then
              echo "FAIL: False positives from $(basename $rule):"
              echo "$output"
              fail=1
            fi
          done
          if [ "$fail" -eq 1 ]; then exit 1; fi
          echo "No false positives across all rules."

      - name: Summary
        if: always()
        run: |
          echo "## YARA Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Rule File | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          for rule in rules/yara/*.yar; do
            if yara "$rule" /dev/null >/dev/null 2>&1; then
              echo "| $(basename $rule) | ✅ Valid |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $(basename $rule) | ❌ Invalid |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          tp_count=$(ls tests/true_positives/ | wc -l)
          tn_count=$(ls tests/true_negatives/ | wc -l)
          echo "**True positives:** $tp_count samples | **True negatives:** $tn_count samples" >> $GITHUB_STEP_SUMMARY
