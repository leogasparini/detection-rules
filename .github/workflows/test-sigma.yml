name: Test Sigma Rules

on:
  push:
    paths:
      - 'rules/sigma/**'
  pull_request:
    paths:
      - 'rules/sigma/**'

jobs:
  sigma-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install sigma-cli
        run: pip install sigma-cli pySigma-validators-sigmaHQ

      - name: Validate Sigma rules
        run: |
          fail=0
          total=0
          passed=0
          for f in $(find rules/sigma/ -name '*.yml' | sort); do
            total=$((total + 1))
            if sigma check "$f" 2>&1; then
              passed=$((passed + 1))
            else
              echo "FAIL: $f"
              fail=1
            fi
          done
          echo ""
          echo "=== Results: $passed/$total rules valid ==="
          if [ "$fail" -eq 1 ]; then exit 1; fi

      - name: Verify no multi-document YAML
        run: |
          fail=0
          for f in $(find rules/sigma/ -name '*.yml'); do
            count=$(grep -c '^---' "$f" || true)
            if [ "$count" -gt 1 ]; then
              echo "FAIL: $f contains multiple YAML documents"
              fail=1
            fi
          done
          if [ "$fail" -eq 1 ]; then exit 1; fi

      - name: Verify required fields
        run: |
          fail=0
          for f in $(find rules/sigma/ -name '*.yml' | sort); do
            for field in title id status description author date level; do
              if ! grep -q "^${field}:" "$f"; then
                echo "FAIL: $f missing required field: $field"
                fail=1
              fi
            done
            if ! grep -q "attack\.t[0-9]" "$f"; then
              echo "WARN: $f has no MITRE ATT&CK technique tag"
            fi
          done
          if [ "$fail" -eq 1 ]; then exit 1; fi

      - name: Check for duplicate rule IDs
        run: |
          dupes=$(grep -rh "^id: " rules/sigma/ | sort | uniq -c | grep -vE "^\s+1 id: " || true)
          if [ -n "$dupes" ]; then
            echo "FAIL: Duplicate rule IDs found:"
            echo "$dupes"
            exit 1
          fi
          echo "No duplicate IDs."

      - name: Validate against Sigma JSON schema
        run: |
          pip install check-jsonschema pyyaml
          wget -q -O /tmp/sigma-schema.json https://raw.githubusercontent.com/SigmaHQ/sigma-specification/refs/tags/v2.1.0/json-schema/sigma-detection-rule-schema.json
          fail=0
          for f in $(find rules/sigma/ -name '*.yml' | sort); do
            if ! check-jsonschema --schemafile /tmp/sigma-schema.json "$f" 2>&1; then
              fail=1
            fi
          done
          if [ "$fail" -eq 1 ]; then exit 1; fi
          echo "All rules pass JSON schema validation."

      - name: Summary
        if: always()
        run: |
          echo "## Sigma Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Rules |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          for dir in rules/sigma/*/; do
            category=$(basename "$dir")
            count=$(find "$dir" -name '*.yml' | wc -l)
            echo "| $category | $count |" >> $GITHUB_STEP_SUMMARY
          done
          total=$(find rules/sigma/ -name '*.yml' | wc -l)
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total rules:** $total" >> $GITHUB_STEP_SUMMARY
